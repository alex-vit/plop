name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (for example v1.0.0)"
        required: true

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.vars.outputs.tag }}
    steps:
      - id: vars
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate tag format
        run: |
          tag="${{ steps.vars.outputs.tag }}"
          if ! [[ "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$ ]]; then
            echo "invalid tag: $tag"
            exit 1
          fi

  windows-build:
    needs: prepare
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build Windows executable and installer
        shell: pwsh
        run: ./scripts/build-windows-release.ps1 -Version "${{ needs.prepare.outputs.tag }}"

      - name: Copy versioned artifacts
        shell: pwsh
        run: |
          $tag = "${{ needs.prepare.outputs.tag }}"
          Copy-Item out/Plop.exe "out/plop-$tag-windows-amd64.exe"
          Copy-Item out/plop-setup.exe "out/plop-$tag-windows-amd64-setup.exe"

      - uses: actions/upload-artifact@v4
        with:
          name: windows-release-assets
          path: |
            out/plop-${{ needs.prepare.outputs.tag }}-windows-amd64.exe
            out/plop-${{ needs.prepare.outputs.tag }}-windows-amd64-setup.exe

  macos-build:
    needs: prepare
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build macOS app bundle
        run: VERSION="${{ needs.prepare.outputs.tag }}" ./scripts/build-mac-app.sh

      - name: Package macOS app bundle
        run: |
          tag="${{ needs.prepare.outputs.tag }}"
          ditto -c -k --sequesterRsrc --keepParent out/Plop.app "out/plop-${tag}-macos-arm64-app.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: macos-release-assets
          path: out/plop-${{ needs.prepare.outputs.tag }}-macos-arm64-app.zip

  release:
    needs:
      - prepare
      - windows-build
      - macos-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          files: |
            dist/windows-release-assets/plop-${{ needs.prepare.outputs.tag }}-windows-amd64.exe
            dist/windows-release-assets/plop-${{ needs.prepare.outputs.tag }}-windows-amd64-setup.exe
            dist/macos-release-assets/plop-${{ needs.prepare.outputs.tag }}-macos-arm64-app.zip
          generate_release_notes: true
