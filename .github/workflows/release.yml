name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (for example v1.0.0)"
        required: true

permissions:
  contents: write

jobs:
  windows-release:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build Windows executable and installer
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $tag = "${{ inputs.tag }}"
          }
          ./scripts/build-windows-release.ps1 -Version $tag

      - name: Copy versioned artifacts
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $tag = "${{ inputs.tag }}"
          }
          Copy-Item out/windows/plop.exe "out/windows/plop-$tag-windows-amd64.exe"
          Copy-Item out/windows/plop-setup.exe "out/windows/plop-$tag-windows-amd64-setup.exe"

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          files: |
            out/windows/plop-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}-windows-amd64.exe
            out/windows/plop-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}-windows-amd64-setup.exe
          generate_release_notes: true
