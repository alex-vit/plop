<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Plop Icon — Blob Explorations v2</title>
<style>
  body { margin: 0; background: #fff; font-family: sans-serif; }
  svg { display: block; margin: 30px auto; }
  h1 { text-align: center; margin-top: 30px; color: #1e1e1e; }
  h2 { text-align: center; color: #757575; font-weight: normal; margin-top: 0; }
</style>
</head>
<body>
<h1>Plop Icon — Blob Explorations v2</h1>
<h2>Slightly squashed blob + anime expression eyes</h2>

<svg viewBox="-10 -20 780 720" width="780" height="720" xmlns="http://www.w3.org/2000/svg">

  <!-- ==================== Row 1: Expressive States ==================== -->
  <text x="20" y="30" font-size="22" fill="#1e1e1e">Expressive Status States</text>

  <!-- === SYNCED: Green ^_^ === -->
  <text x="55" y="70" font-size="16" fill="#15803d">Synced  ^_^</text>
  <ellipse cx="115" cy="135" rx="60" ry="48" fill="#22c55e" stroke="#15803d" stroke-width="2"/>
  <!-- ^_^ happy arch eyes — upward arcs -->
  <path d="M 88 122 Q 96 110 104 122" stroke="#1e1e1e" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M 126 118 Q 134 106 142 118" stroke="#1e1e1e" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- === SYNCING: Yellow ·_· === -->
  <text x="290" y="70" font-size="16" fill="#b45309">Syncing  ._.</text>
  <ellipse cx="345" cy="135" rx="60" ry="48" fill="#f59e0b" stroke="#b45309" stroke-width="2"/>
  <!-- ·_· neutral dot eyes -->
  <ellipse cx="326" cy="125" rx="6" ry="7" fill="#1e1e1e"/>
  <ellipse cx="364" cy="121" rx="6" ry="7" fill="#1e1e1e"/>

  <!-- === ERROR: Red >_< === -->
  <text x="530" y="70" font-size="16" fill="#dc2626">Error  &gt;_&lt;</text>
  <ellipse cx="575" cy="135" rx="60" ry="48" fill="#ef4444" stroke="#dc2626" stroke-width="2"/>
  <!-- >_< squeezed X eyes -->
  <line x1="550" y1="116" x2="564" y2="130" stroke="#1e1e1e" stroke-width="3" stroke-linecap="round"/>
  <line x1="564" y1="116" x2="550" y2="130" stroke="#1e1e1e" stroke-width="3" stroke-linecap="round"/>
  <line x1="586" y1="116" x2="600" y2="130" stroke="#1e1e1e" stroke-width="3" stroke-linecap="round"/>
  <line x1="600" y1="116" x2="586" y2="130" stroke="#1e1e1e" stroke-width="3" stroke-linecap="round"/>

  <!-- ==================== Row 2: More expressions ==================== -->
  <text x="20" y="230" font-size="22" fill="#1e1e1e">Additional States</text>

  <!-- === IDLE/OFFLINE: Gray -_- === -->
  <text x="55" y="270" font-size="16" fill="#6b7280">Offline  -_-</text>
  <ellipse cx="115" cy="335" rx="60" ry="48" fill="#9ca3af" stroke="#6b7280" stroke-width="2"/>
  <!-- -_- sleepy flat line eyes -->
  <line x1="88" y1="325" x2="108" y2="325" stroke="#1e1e1e" stroke-width="3" stroke-linecap="round"/>
  <line x1="126" y1="321" x2="146" y2="321" stroke="#1e1e1e" stroke-width="3" stroke-linecap="round"/>

  <!-- === CONNECTING: Blue o_o === -->
  <text x="280" y="270" font-size="16" fill="#2563eb">Connecting  o_o</text>
  <ellipse cx="345" cy="335" rx="60" ry="48" fill="#4a9eed" stroke="#2563eb" stroke-width="2"/>
  <!-- o_o wide open eyes -->
  <ellipse cx="326" cy="323" rx="9" ry="10" fill="#1e1e1e"/>
  <ellipse cx="364" cy="319" rx="9" ry="10" fill="#1e1e1e"/>
  <circle cx="328" cy="320" r="3" fill="#fff"/>
  <circle cx="366" cy="316" r="3" fill="#fff"/>

  <!-- === CONFLICT: Orange @_@ === -->
  <text x="525" y="270" font-size="16" fill="#c2410c">Conflict  @_@</text>
  <ellipse cx="575" cy="335" rx="60" ry="48" fill="#fb923c" stroke="#c2410c" stroke-width="2"/>
  <!-- @_@ spiral/dizzy eyes — concentric circles -->
  <circle cx="557" cy="323" r="9" fill="none" stroke="#1e1e1e" stroke-width="2.5"/>
  <circle cx="557" cy="323" r="3.5" fill="#1e1e1e"/>
  <circle cx="593" cy="319" r="9" fill="none" stroke="#1e1e1e" stroke-width="2.5"/>
  <circle cx="593" cy="319" r="3.5" fill="#1e1e1e"/>

  <!-- ==================== Row 3: Size comparison ==================== -->
  <text x="20" y="430" font-size="22" fill="#1e1e1e">Size Check — Will it read at tray size?</text>

  <!-- Large (app icon ~128px) -->
  <text x="40" y="470" font-size="14" fill="#757575">App icon</text>
  <ellipse cx="90" cy="540" rx="60" ry="48" fill="#22c55e" stroke="#15803d" stroke-width="2"/>
  <path d="M 63 528 Q 71 516 79 528" stroke="#1e1e1e" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M 101 524 Q 109 512 117 524" stroke="#1e1e1e" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- Medium (~48px) -->
  <text x="215" y="470" font-size="14" fill="#757575">48px</text>
  <ellipse cx="240" cy="545" rx="30" ry="24" fill="#22c55e" stroke="#15803d" stroke-width="1.5"/>
  <path d="M 226 539 Q 230 533 234 539" stroke="#1e1e1e" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M 246 537 Q 250 531 254 537" stroke="#1e1e1e" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Small (~32px tray) -->
  <text x="320" y="470" font-size="14" fill="#757575">32px</text>
  <ellipse cx="340" cy="548" rx="20" ry="16" fill="#22c55e" stroke="#15803d" stroke-width="1"/>
  <path d="M 330 544 Q 333 540 336 544" stroke="#1e1e1e" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M 344 542 Q 347 538 350 542" stroke="#1e1e1e" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Tiny (~16px tray) -->
  <text x="405" y="470" font-size="14" fill="#757575">16px</text>
  <ellipse cx="420" cy="550" rx="10" ry="8" fill="#22c55e" stroke="#15803d" stroke-width="1"/>
  <path d="M 415 548 Q 417 546 419 548" stroke="#1e1e1e" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M 422 547 Q 424 545 426 547" stroke="#1e1e1e" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  <!-- Error at sizes -->
  <text x="490" y="470" font-size="14" fill="#757575">Error at sizes</text>

  <ellipse cx="510" cy="540" rx="60" ry="48" fill="#ef4444" stroke="#dc2626" stroke-width="2"/>
  <line x1="485" y1="522" x2="499" y2="536" stroke="#1e1e1e" stroke-width="3" stroke-linecap="round"/>
  <line x1="499" y1="522" x2="485" y2="536" stroke="#1e1e1e" stroke-width="3" stroke-linecap="round"/>
  <line x1="521" y1="522" x2="535" y2="536" stroke="#1e1e1e" stroke-width="3" stroke-linecap="round"/>
  <line x1="535" y1="522" x2="521" y2="536" stroke="#1e1e1e" stroke-width="3" stroke-linecap="round"/>

  <ellipse cx="620" cy="548" rx="20" ry="16" fill="#ef4444" stroke="#dc2626" stroke-width="1"/>
  <line x1="612" y1="543" x2="618" y2="549" stroke="#1e1e1e" stroke-width="2" stroke-linecap="round"/>
  <line x1="618" y1="543" x2="612" y2="549" stroke="#1e1e1e" stroke-width="2" stroke-linecap="round"/>
  <line x1="624" y1="543" x2="630" y2="549" stroke="#1e1e1e" stroke-width="2" stroke-linecap="round"/>
  <line x1="630" y1="543" x2="624" y2="549" stroke="#1e1e1e" stroke-width="2" stroke-linecap="round"/>

  <ellipse cx="670" cy="550" rx="10" ry="8" fill="#ef4444" stroke="#dc2626" stroke-width="1"/>
  <line x1="665" y1="548" x2="668" y2="551" stroke="#1e1e1e" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="668" y1="548" x2="665" y2="551" stroke="#1e1e1e" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="672" y1="547" x2="675" y2="550" stroke="#1e1e1e" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="675" y1="547" x2="672" y2="550" stroke="#1e1e1e" stroke-width="1.5" stroke-linecap="round"/>

  <!-- ==================== Row 4: Summary ==================== -->
  <text x="20" y="630" font-size="18" fill="#1e1e1e">Summary</text>
  <text x="20" y="660" font-size="14" fill="#757575">Shape: slightly squashed ellipse (rx:ry ~ 5:4)  |  Eyes: anime expressions per state  |  Color = status</text>
  <text x="20" y="685" font-size="14" fill="#757575">^_^ green synced  |  ._. yellow syncing  |  &gt;_&lt; red error  |  -_- gray offline  |  o_o blue connecting  |  @_@ orange conflict</text>

</svg>
</body>
</html>
